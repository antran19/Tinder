# ============================================
#  Dating App — Docker Compose
#  Run: docker-compose up --build
# ============================================

version: '3.8'

services:
  # ========== MongoDB ==========
  mongodb:
    image: mongo:7
    container_name: dating-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=dating_app
    networks:
      - dating-net

  # ========== Backend API ==========
  backend:
    build: ./backend
    container_name: dating-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/dating_app
      - JWT_SECRET=${JWT_SECRET:-super-secret-change-me}
      - JWT_EXPIRES_IN=7d
    depends_on:
      - mongodb
    volumes:
      - uploads:/app/uploads
    networks:
      - dating-net

  # ========== Frontend ==========
  frontend:
    build: ./frontend
    container_name: dating-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dating-net

volumes:
  mongo-data:
  uploads:

networks:
  dating-net:
    driver: bridge
